<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Typing Game</title>
    <meta name="description" content="A simple, challenging speed typing game to test your WPM and accuracy.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Speed Typing Game</h1>
        
        <div class="stats-container">
            <div class="stat">
                <span class="stat-label">Speed</span>
                <span id="stat-speed">0.00s</span>
            </div>
            <div class="stat">
                <span class="stat-label">WPM</span>
                <span id="stat-wpm">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Errors</span>
                <span id="stat-errors">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Accuracy</span>
                <span id="stat-accuracy">100.0%</span>
            </div>
        </div>

        <div class="game-area">
            <div id="sentence-display" class="sentence-display"></div>
            <input type="text" id="type-input" placeholder="Start typing to begin..." autocomplete="off">
            <button id="next-round-btn" class="hidden">Next Round</button>
        </div>

        <div class="leaderboard-container">
            <h2>Leaderboard</h2>
            <table id="leaderboard">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>WPM</th>
                        <th>Accuracy</th>
                        <th>Speed</th>
                        <th>Errors</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <!-- Leaderboard rows will be inserted here -->
                </tbody>
            </table>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
